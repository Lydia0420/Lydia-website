<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork 16 - Guess the Character Game</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Slackey&display=swap');

        body {
            background-color: rgb(255, 255, 255);
            color: rgb(0, 0, 0);
            font-family: "Georgia", serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; 
        }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            z-index: 1000;
            display: flex;
        }

        .back-btn {
            font-size: 1.2rem;
            color: rgb(0, 0, 0);
            text-decoration: none;
            border-bottom: 2px solid rgb(0, 0, 0);
            transition: opacity 0.3s ease-in-out;
            margin-left: 20px;
        }

        .back-btn:hover {
            opacity: 0.6;
        }

        /* work */
        .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 85%;
            max-width: 1200px;
        }

        .text-content {
            width: 50%;
            text-align: left;
        }

        .title {
            font-size: 2.8rem;
            margin-bottom: 25px;
            font-family: 'Slackey', cursive;
        }

        .description {
            font-size: 1.2rem;
            line-height: 1.5;
            opacity: 0.9;
            margin-bottom: 20px;
            color: rgb(99, 102, 105);
        }

        .play-btn {
            display: inline-block;
            padding: 12px 20px;
            font-size: 1.2rem;
            background-color: #ffcc00;
            color: black;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s ease-in-out;
        }

        .play-btn:hover {
            background-color: #ffdd33;
            color: rgb(217, 0, 0);
            box-shadow: 0 6px 20px rgba(255, 204, 0, 0.6); /* Add a shadow to the element */
            transform: scale(1.05);
        }

        video {
            width: 460px;  
            height: 460px; 
            border-radius: 10px;
            margin-top: 80px;
        }

        @media (max-width: 1024px) {
            .container {
                width: 90%;
                max-width: 900px;
                gap: 20px;
            }
            .text-content {
                width: 55%;
            }
            .title {
                font-size: 2.5rem;
            }
            .description {
                font-size: 1.1rem;
            }
            .play-btn {
                font-size: 1rem;
                padding: 10px 18px;
            }
            video {
                width: 400px;
                height: 400px;
            }
        }

        @media (max-width: 768px) {
            body {
                height: auto; 
                min-height: 100vh; 
                overflow: auto;
            }

            .container {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .text-content {
                width: 90%;
            }
            .title {
                font-size: 2.2rem;
                margin-top: 80px;
            }
            .description {
                font-size: 1rem;
            }
            .play-btn {
                font-size: 1rem;
                padding: 10px 16px;
            }
            video {
                width: 90%;
                max-width: 400px;
                height: auto;
                margin-top: 40px;
                margin-bottom: 40px;
            }
        }


        .lang-toggle {
          margin-left: 8px;   
          margin-top: 4px;
          align-self: center;            
          border: 1px solid rgba(0,0,0,.1);
          background: rgba(255,255,255,.4);
          border-radius: 6px;
          padding: 2px 8px;
          font-size: 12px;
          opacity: 0.7;
          cursor: pointer;
          transition: opacity 0.3s ease;
          color: white;
        }

        .lang-toggle:hover {
          opacity: 1;
        }

        @media (max-width:768px){
          .lang-toggle { 
            position:relative; 
            z-index:10000; 
          }
        }
    </style>
</head>
<body>
    <nav>
        <a href="../index.html#gallery" class="back-btn">← Back </a>

        <div class="lang-right">
            <button id="lang-toggle" class="lang-toggle" aria-label="toggle language">中文</button>
        </div>
    </nav>

    <div class="container">
        <div class="text-content">
            <h1 class="title" data-i18n="art16.Title">Guess the Character</h1>
            <p class="description" data-i18n="art16.description1">
                This game invites players to test their knowledge of animated characters.
            </p>

            <p class="description" data-i18n="art16.description2">
                Designing the color blocks was particularly tricky,
                balancing just enough information to make it solvable, 
                yet challenging enough to keep players engaged. 
            </p>

            <a href="https://openprocessing.org/sketch/2430512" target="_blank" class="play-btn" data-i18n="art9.play">🎮 Play the Game</a>
        </div>

        <div class="video-container">
            <video controls poster="../02/art16.jpg">
                <source src="../images/game/art16.mov" type="video/mp4">
            </video>
        </div>
    </div>

    <script>
        document.querySelector(".back-btn").addEventListener("click", (e) => {
          e.preventDefault();
          window.location.href = "../index.html#game-modal";
        });
    </script>

  <script src="../i18n.js"></script>
  <script src="../script.js"></script>
</body>
</html>
